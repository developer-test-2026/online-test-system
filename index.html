<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>試験システム</title>

<style>
body{font-family:sans-serif;margin:0;}
.header{
  background:#ffebee;
  color:#c62828;
  text-align:center;
  padding:10px;
  font-weight:bold;
}

#login{
  max-width:500px;
  margin:40px auto;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:5px;
}

button{
  padding:10px 20px;
  cursor:pointer;
}

#counter{
  position:fixed;
  top:10px;
  right:10px;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}
</style>
</head>
<body>

<div class="header">
試験中は他の操作をしないでください
</div>

<div id="counter">
離脱回数: <span id="leaveCount">0</span><br>
離脱時間: <span id="leaveTime">0</span>
</div>

<div id="login">
<h2>受験者情報</h2>
<input id="name" placeholder="氏名"><br>
<input id="sid" placeholder="学籍番号"><br>
<button onclick="start()">開始</button>
</div>

<div id="app" style="display:none;"></div>

<script>

let questions=[];
let config={};

let current=0;
let score=0;

let leaveCount=0;
let leaveTime=0;
let leaveStart=null;

let active=false;

async function load(){
  const q = await fetch("questions.csv");
  const text = await q.text();

  const lines = text.trim().split("\n").slice(1);

  questions = lines.map(l=>{
    const c=l.split(",");
    return{
      q:c[0],
      choices:c.slice(1,5),
      ans:Number(c[5])
    }
  });
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function render(){
  let q=questions[current];

  let choices=q.choices.map((c,i)=>
    `<label><input type="radio" name="q" value="${i+1}">${c}</label><br>`
  ).join("");

  document.getElementById("app").innerHTML=
  `<h3>${q.q}</h3>${choices}<br>
  <button onclick="next()">次へ</button>`;
}

function next(){
  let sel=document.querySelector("input[name=q]:checked");
  if(!sel)return;

  if(Number(sel.value)==questions[current].ans){
    score++;
  }

  current++;

  if(current>=questions.length){
    finish();
    return;
  }

  render();
}

function finish(){
  active=false;

  document.body.innerHTML=
  `<h1>結果</h1>
  <h2>スコア: ${score}/${questions.length}</h2>
  <p>離脱回数: ${leaveCount}</p>
  <p>離脱時間: ${leaveTime}秒</p>`;
}

function start(){
  active=true;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  render();
}

document.addEventListener("visibilitychange",()=>{
  if(!active)return;

  if(document.hidden){
    leaveStart=Date.now();
  }else{
    leaveCount++;
    leaveTime+=Math.round((Date.now()-leaveStart)/1000);

    document.getElementById("leaveCount").innerText=leaveCount;
    document.getElementById("leaveTime").innerText=leaveTime;
  }
});

window.onload=load;

</script>

</body>
</html>
