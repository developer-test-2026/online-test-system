<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>試験</title>

<style>
body{margin:0;font-family:sans-serif;}
.header{
  background:#ffebee;
  color:#c62828;
  text-align:center;
  padding:10px;
}
#login{text-align:center;margin:40px;}
input{padding:10px;margin:5px;width:80%;}
button{padding:10px 20px;}
#app{display:none;}
#counter{
  position:fixed;top:10px;right:10px;
  background:white;border:1px solid #ccc;padding:10px;
}
</style>
</head>

<body>

<div class="header">試験中は他の操作禁止</div>

<div id="counter">
離脱:<span id="l1">0</span><br>
時間:<span id="l2">0</span><br>
不正:<span id="l3">0</span>
</div>

<div id="login">
<h2>受験者情報</h2>
<input id="name" placeholder="氏名">
<input id="sid" placeholder="学籍番号"><br>
<button onclick="start()">開始</button>
</div>

<div id="app"></div>

<script>

let questions=[];
let current=0;
let score=0;

let leaveCount=0;
let leaveTime=0;
let leaveStart=null;
let violation=0;

let active=false;

let token=localStorage.getItem("token");
if(!token){
  token=crypto.randomUUID();
  localStorage.setItem("token",token);
}

// CSV
async function load(){
  const res=await fetch("questions.csv");
  const text=await res.text();

  questions=text.trim().split("\n").slice(1).map(l=>{
    let c=l.split(",");
    return {
      q:c[0],
      choices:c.slice(1,5),
      ans:+c[5]
    }
  });
}

// 出題
function render(){
  let q=questions[current];

  document.getElementById("app").innerHTML=
  `<h3>${q.q}</h3>`+
  q.choices.map((c,i)=>
    `<label><input type="radio" name="q" value="${i+1}">${c}</label><br>`
  ).join("")+
  `<br><button onclick="next()">次へ</button>`;
}

// 次へ
function next(){

  let sel=document.querySelector("input[name=q]:checked");
  if(!sel)return;

  if(+sel.value===questions[current].ans){
    score++;
  }

  current++;

  if(current>=questions.length){
    finish();
    return;
  }

  render();
}

// 開始
function start(){

  active=true;
  document.documentElement.requestFullscreen();

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  render();
}

// 送信
async function send(){

  await fetch("YOUR_GAS_URL",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:document.getElementById("name").value,
      studentId:document.getElementById("sid").value,
      score,
      risk:leaveCount+violation,
      leaveCount,
      leaveTime,
      token
    })
  });

}

// 終了
function finish(){

  active=false;

  send();

  let risk=leaveCount*10+leaveTime*0.5+violation*20;

  document.body.innerHTML=
  `<h1>結果</h1>
   <h2>スコア:${score}/${questions.length}</h2>
   <p>離脱:${leaveCount}</p>
   <p>時間:${leaveTime}</p>
   <p>不正:${risk}</p>`;
}

// 監視
document.addEventListener("visibilitychange",()=>{

  if(!active)return;

  if(document.hidden){
    leaveStart=Date.now();
    violation++;
  }else{
    leaveCount++;
    leaveTime+=Math.round((Date.now()-leaveStart)/1000);

    document.getElementById("l1").innerText=leaveCount;
    document.getElementById("l2").innerText=leaveTime;
    document.getElementById("l3").innerText=violation;
  }
});

window.onload=load;

</script>

</body>
</html>
