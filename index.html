<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>試験システム</title>
<style>
body{margin:0;font-family:sans-serif;background:#f5f7fa;color:#333;}
.header{background:#ffebee;color:#c62828;text-align:center;padding:10px;font-weight:bold;}
#login{max-width:500px;margin:40px auto;text-align:center;background:white;padding:30px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
input{width:90%;padding:10px;margin:10px;font-size:16px;box-sizing:border-box;}
button{padding:12px 24px;font-size:16px;cursor:pointer;background:#1a73e8;color:white;border:none;border-radius:4px;font-weight:bold;}
button:hover{background:#1557b0;}
#app{display:none;max-width:800px;margin:20px auto;padding:20px;}
#counter{position:fixed;top:10px;right:10px;background:white;border:1px solid #ccc;padding:10px;font-size:14px;border-radius:4px;z-index:1000;}
.section-card{background:white;padding:25px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:20px;}
.section-title{background:#e8f0fe;color:#1a73e8;padding:12px;border-radius:4px;margin-bottom:20px;font-size:18px;font-weight:bold;}
.question-block{margin-bottom:20px;padding-bottom:15px;border-bottom:1px dashed #eee;}
.question-text{font-weight:bold;font-size:16px;margin-bottom:10px;}
.choice-label{display:block;margin:8px 0;cursor:pointer;}
</style>
</head>
<body>
<div class="header">試験中は他の操作をしないでください</div>
<div id="counter">
  残り時間: <span id="timerDisplay">--</span><br>
  離脱: <span id="leaveCount">0</span> | 不正: <span id="violation">0</span>
</div>

<div id="login">
  <h2 id="exam-title">試験システム</h2>
  <input id="name" placeholder="氏名">
  <input id="sid" placeholder="学籍番号"><br>
  <button onclick="start()">開始</button>
</div>

<div id="app"></div>

<script>
// 元々の監視用変数をすべて維持
let questions=[], score=0, active=false, leaveCount=0, leaveTime=0, leaveStart=null, violation=0, timerInterval;
let CONFIG = { timeLimit: 1800, autoSubmit: true }; 
let timeLeft = CONFIG.timeLimit;

let token = localStorage.getItem("exam_token") || crypto.randomUUID();
localStorage.setItem("exam_token", token);

// CSVの代わりに統合されたconfig.jsonから設定と問題を読み込むように変更
async function load(){
  try {
    const res = await fetch("config.json");
    const configData = await res.json();
    
    // 設定値の同期
    CONFIG = configData;
    timeLeft = CONFIG.timeLimit || 1800;
    if(CONFIG.examName) {
      document.getElementById("exam-title").innerText = CONFIG.examName;
    }
    
    // 全セクションから問題を一つの配列にフラットに展開（採点用）
    questions = [];
    if(CONFIG.sections) {
      CONFIG.sections.forEach(sec => {
        sec.questions.forEach(q => {
          questions.push(q);
        });
      });
    }
  } catch(e) {
    alert("config.jsonの読み込みに失敗しました。");
  }
}

function start(){
  if(!document.getElementById("name").value.trim() || !document.getElementById("sid").value.trim()) {
    return alert("氏名と学籍番号を入力してください。");
  }
  active=true;
  document.documentElement.requestFullscreen().catch(()=>{});
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  
  if(CONFIG.autoSubmit){
    timerInterval = setInterval(()=>{
      timeLeft--;
      document.getElementById("timerDisplay").innerText = Math.floor(timeLeft/60) + ":" + (timeLeft%60).toString().padStart(2,'0');
      if(timeLeft <= 0) {
        alert("制限時間になりました。自動送信します。");
        finish();
      }
    }, 1000);
  }
  render();
}

// Googleフォームのようにセクション分けして全問をスクロール一覧表示
function render(){
  if(!CONFIG.sections || CONFIG.sections.length === 0) {
    document.getElementById("app").innerHTML = "<p>問題が設定されていません。</p>";
    return;
  }

  let html = "";
  let qIndex = 0; // 全体での通し問題インデックス

  CONFIG.sections.forEach((sec, sIdx) => {
    html += `<div class="section-card">`;
    html += `<div class="section-title">${sec.title || 'セクション ' + (sIdx + 1)}</div>`;
    
    sec.questions.forEach((q) => {
      html += `
        <div class="question-block">
          <div class="question-text">Q. ${q.q}</div>
          ${q.choices.map((c, i) => `
            <label class="choice-label">
              <input type="radio" name="q_${qIndex}" value="${i + 1}"> ${c}
            </label>
          `).join("")}
        </div>`;
      qIndex++;
    });
    
    html += `</div>`;
  });

  html += `<div style="text-align:center; margin:30px 0;"><button onclick="confirmFinish()">回答を送信する</button></div>`;
  document.getElementById("app").innerHTML = html;
}

function confirmFinish() {
  if(confirm("試験を終了して回答を送信しますか？\n一度送信すると修正はできません。")) {
    finish();
  }
}

async function finish(){
  active=false;
  clearInterval(timerInterval);
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});

  // 全問一括採点
  score = 0;
  let qIndex = 0;
  if(CONFIG.sections) {
    CONFIG.sections.forEach(sec => {
      sec.questions.forEach(q => {
        let sel = document.querySelector(`input[name="q_${qIndex}"]:checked`);
        if(sel && Number(sel.value) === q.ans) {
          score++;
        }
        qIndex++;
      });
    });
  }

  // 元々のGAS送信ロジックと送信項目（キー名）を完全に維持
  await fetch("https://script.google.com/macros/s/AKfycbx_7hO1brtwsA7MZIxq7pj3YeDWrTySisWcWyeV-my0SDwFaxvi-Cd2uS_RpUm4UdQ_/exec", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:document.getElementById("name").value, 
      studentId:document.getElementById("sid").value, 
      score:score, 
      leaveCount:leaveCount, 
      leaveTime:leaveTime, 
      violation:violation
    })
  });
  
  document.body.innerHTML=`<div style="text-align:center;margin-top:100px;"><h1>終了</h1><p style="font-size:20px;">スコア: ${score}/${qIndex}</p></div>`;
}

// 元々の不正監視ロジックを完全に維持
document.addEventListener("visibilitychange",()=>{
  if(!active) return;
  if(document.hidden){ leaveStart=Date.now(); violation++; }
  else{ leaveCount++; leaveTime+=Math.round((Date.now()-leaveStart)/1000); }
  document.getElementById("leaveCount").innerText=leaveCount;
  document.getElementById("violation").innerText=violation;
});
window.onload=load;
</script>
</body>
</html>
