<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オンライン試験システム</title>
<style>
  :root { --theme: #1565c0; }
  body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
  .header { background: var(--theme); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
  .warning { background: #ffebee; color: #c62828; text-align: center; padding: 5px; font-size: 0.9em; }
  #container { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
  select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
  button { background: var(--theme); color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; }
  button:hover { opacity: 0.9; }
  #status-bar { display: flex; justify-content: space-between; background: #eee; padding: 10px; border-radius: 4px; margin-bottom: 20px; position: sticky; top: 0; z-index: 100;}
  .progress-bg { width: 100%; background: #ddd; height: 10px; border-radius: 5px; margin-bottom: 20px; }
  .progress-bar { height: 10px; background: var(--theme); border-radius: 5px; transition: width 0.3s; }
  .question-block { margin-bottom: 30px; }
  .question-text { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; }
  .score-badge { display: inline-block; background: #ff9800; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; margin-left: 10px; }
  .option-label { display: block; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; transition: 0.2s; }
  .option-label:hover { background: #f0f8ff; }
  textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
  #review-mode { border: 2px solid #4caf50; padding: 10px; margin-bottom: 20px; background: #e8f5e9; text-align: center; color: #2e7d32; font-weight: bold; }
  .review-answer { margin-top: 10px; padding: 10px; background: #fff3e0; border-left: 4px solid #ff9800; }
</style>
</head>
<body>

<div class="header" id="exam-title">試験システム</div>
<div class="warning" id="warning-bar">※試験中はタブの切り替えや右クリック等を禁止しています</div>

<div id="container">
  <div id="login-screen">
    <h2>受験者情報入力</h2>
    <select id="class-select">
      <option value="">クラスを選択してください</option>
      <option value="1年1組">1年1組</option>
      <option value="1年5組">1年5組</option>
      <option value="2年1組">2年1組</option>
    </select>
    <input type="text" id="sid" placeholder="学籍番号 (例: 2026001)">
    <input type="text" id="name" placeholder="氏名">
    <button onclick="startExam()">試験開始</button>
    <hr style="margin:20px 0; border:none; border-top:1px solid #ccc;">
    <button onclick="checkReview()" style="background:#607d8b;">過去の受験を見直す</button>
  </div>

  <div id="exam-screen" style="display:none;">
    <div id="status-bar">
      <div>問題: <span id="current-q-num">1</span> / <span id="total-q-num">0</span></div>
      <div id="timer-display" style="font-weight:bold; color:#d32f2f;">残り時間: --:--</div>
    </div>
    <div class="progress-bg" id="progress-container" style="display:none;">
      <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
    </div>
    
    <div id="question-area"></div>
    
    <div style="display:flex; gap:10px;">
      <button id="prev-btn" onclick="prevQuestion()" style="background:#757575; display:none;">前へ</button>
      <button id="next-btn" onclick="nextQuestion()">次へ</button>
    </div>
  </div>

  <div id="review-screen" style="display:none;">
    <div id="review-mode">見直しモード（監視オフ）</div>
    <h2>結果と解説</h2>
    <div id="review-area"></div>
    <button onclick="location.reload()">トップに戻る</button>
  </div>
</div>

<script>
let config = {}, questions = [], currentQ = 0;
let userAnswers = {};
let timeLeft = 0, timerInterval;
let violations = { leave: 0, copy: 0, devtools: 0 };
let examActive = false;

// 設定データの読み込み
async function loadConfig() {
  try {
    const res = await fetch('config.json');
    const data = await res.json();
    config = data.settings;
    questions = data.questions;
    
    document.documentElement.style.setProperty('--theme', config.themeColor);
    document.getElementById('exam-title').innerText = config.examName;
    if(config.showProgress) document.getElementById('progress-container').style.display = 'block';
    
  } catch(e) {
    alert("設定ファイルの読み込みに失敗しました。");
  }
}

// シャッフル用関数
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startExam() {
  const name = document.getElementById('name').value;
  const sid = document.getElementById('sid').value;
  const cls = document.getElementById('class-select').value;
  if(!name || !sid || !cls) return alert('全ての情報を入力してください。');

  // 受験履歴の確認
  const historyKey = `exam_history_${config.examId}_${sid}`;
  if(localStorage.getItem(historyKey)) {
    alert('既にこの試験は受験済みです。見直しモードに移行します。');
    return loadReview(historyKey);
  }

  // 時間チェック
  const now = new Date();
  if(config.startTime && now < new Date(config.startTime)) return alert('試験開始時間前です。');
  if(config.endTime && now > new Date(config.endTime)) return alert('試験は終了しました。');

  if(config.randomQuestion) shuffle(questions);
  if(config.randomChoice) {
    questions.forEach(q => {
      if(q.type === 'single' || q.type === 'multiple') {
        // 選択肢と正答インデックスの整合性を保つ処理が必要ですが、簡易化のためここでは省略
      }
    });
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  document.documentElement.requestFullscreen().catch(e=>console.log(e));
  
  examActive = true;
  timeLeft = config.timeLimit;
  document.getElementById('total-q-num').innerText = questions.length;
  
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60);
    const s = (timeLeft % 60).toString().padStart(2, '0');
    document.getElementById('timer-display').innerText = `残り時間: ${m}:${s}`;
    if(timeLeft <= 0) {
      if(config.autoSubmit) submitExam();
      else { clearInterval(timerInterval); alert('時間切れです。手動で提出してください。'); }
    }
  }, 1000);

  renderQuestion();
  setupSecurity();
}

function renderQuestion() {
  const q = questions[currentQ];
  const qNum = currentQ + 1;
  document.getElementById('current-q-num').innerText = qNum;
  document.getElementById('progress-bar').style.width = `${(qNum / questions.length) * 100}%`;
  
  let html = `<div class="question-block">
    <div class="question-text">Q${qNum}. ${q.text} 
      ${config.showScore ? `<span class="score-badge">${q.score}点</span>` : ''}
    </div>`;

  const ans = userAnswers[q.id] || [];

  if(q.type === 'single' || q.type === 'tf') {
    q.options.forEach((opt, i) => {
      const checked = ans.includes(i) ? 'checked' : '';
      html += `<label class="option-label"><input type="radio" name="q_${q.id}" value="${i}" onchange="saveAnswer('${q.id}', [${i}])" ${checked}> ${opt}</label>`;
    });
  } else if(q.type === 'multiple') {
    q.options.forEach((opt, i) => {
      const checked = ans.includes(i) ? 'checked' : '';
      html += `<label class="option-label"><input type="checkbox" name="q_${q.id}" value="${i}" onchange="saveMultiAnswer('${q.id}', ${i})" ${checked}> ${opt}</label>`;
    });
  } else if(q.type === 'text') {
    const val = ans[0] || '';
    html += `<textarea placeholder="解答を入力" onkeyup="saveAnswer('${q.id}', [this.value])">${val}</textarea>`;
  }

  html += `</div>`;
  document.getElementById('question-area').innerHTML = html;

  document.getElementById('prev-btn').style.display = currentQ > 0 ? 'block' : 'none';
  document.getElementById('next-btn').innerText = currentQ === questions.length - 1 ? '提出する' : '次へ';
}

function saveAnswer(qId, val) { userAnswers[qId] = val; }
function saveMultiAnswer(qId, val) {
  if(!userAnswers[qId]) userAnswers[qId] = [];
  const idx = userAnswers[qId].indexOf(val);
  if(idx > -1) userAnswers[qId].splice(idx, 1);
  else userAnswers[qId].push(val);
}

function nextQuestion() {
  if(currentQ === questions.length - 1) submitExam();
  else { currentQ++; renderQuestion(); }
}
function prevQuestion() {
  if(currentQ > 0) { currentQ--; renderQuestion(); }
}

async function submitExam() {
  examActive = false;
  clearInterval(timerInterval);
  if(document.fullscreenElement) document.exitFullscreen();

  // 自動採点ロジック（単一、複数、○×）
  let totalScore = 0;
  questions.forEach(q => {
    if(q.type !== 'text') {
      const uAns = userAnswers[q.id] || [];
      const isCorrect = uAns.length === q.answer.length && uAns.every(v => q.answer.includes(v));
      if(isCorrect) totalScore += q.score;
    }
  });

  const payload = {
    examId: config.examId,
    studentId: document.getElementById('sid').value,
    name: document.getElementById('name').value,
    className: document.getElementById('class-select').value,
    score: totalScore,
    answers: userAnswers,
    violations: violations,
    timestamp: new Date().toISOString()
  };

  // Webhook等の送信モック
  console.log("Submit Payload:", payload);
  
  // 見直し用に保存
  localStorage.setItem(`exam_history_${config.examId}_${payload.studentId}`, JSON.stringify(payload));

  document.getElementById('exam-screen').innerHTML = `<h2>試験完了</h2><p>お疲れ様でした。解答が送信されました。</p><p>自動採点スコア: ${totalScore}点 (※記述式の配点を除く)</p>`;
}

// 不正検知機能
function setupSecurity() {
  const alertViolation = (type) => {
    if(!examActive) return;
    violations[type]++;
    alert(`不正な操作を検知しました: ${type} (計${violations[type]}回)`);
  };

  document.addEventListener("visibilitychange", () => { if(document.hidden) alertViolation('leave'); });
  document.addEventListener("copy", (e) => { e.preventDefault(); alertViolation('copy'); });
  document.addEventListener("contextmenu", (e) => { e.preventDefault(); alertViolation('devtools'); });
  document.addEventListener("keydown", (e) => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
      e.preventDefault(); alertViolation('devtools');
    }
  });
  document.addEventListener("fullscreenchange", () => {
    if(!document.fullscreenElement && examActive) alertViolation('leave');
  });
}

// 見直しモード機能
function checkReview() {
  const sid = document.getElementById('sid').value;
  if(!sid) return alert('学籍番号を入力してください。');
  const historyKey = `exam_history_${config.examId}_${sid}`;
  if(localStorage.getItem(historyKey)) loadReview(historyKey);
  else alert('受験記録が見つかりません。');
}

function loadReview(key) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'block';
  
  const record = JSON.parse(localStorage.getItem(key));
  let html = `<p>受験日時: ${new Date(record.timestamp).toLocaleString()}</p>`;
  
  questions.forEach((q, i) => {
    const ans = record.answers[q.id] || [];
    let isCorrect = false;
    let ansText = "";
    let correctText = "";

    if(q.type === 'text') {
      ansText = ans[0] || '無回答';
      correctText = `模範解答: ${q.answer[0]}<br><span style="color:red">※管理者による採点待ち</span>`;
    } else {
      isCorrect = ans.length === q.answer.length && ans.every(v => q.answer.includes(v));
      ansText = ans.map(v => q.options[v]).join(', ') || '無回答';
      correctText = `正解: ${q.answer.map(v => q.options[v]).join(', ')}`;
    }

    html += `
      <div class="question-block" style="border: 1px solid #ccc; padding: 15px; border-radius: 5px;">
        <div class="question-text">Q${i+1}. ${q.text} [${q.score}点] ${isCorrect ? '✅' : '❌'}</div>
        <div class="review-answer">
          あなたの解答: <b>${ansText}</b><br>
          ${correctText}
        </div>
      </div>
    `;
  });
  
  document.getElementById('review-area').innerHTML = html;
}

window.onload = loadConfig;
</script>
</body>
</html>
