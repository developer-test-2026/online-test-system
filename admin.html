<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試験管理システム - 管理者画面</title>
<style>
:root { --accent: #4f46e5; --danger: #ef4444; --success: #10b981; --border: #e2e8f0; --text: #1e293b; --bg: #f1f5f9; }
body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
.container { max-width: 1100px; margin: 0 auto; }
.card { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
h2 { margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 10px; color: var(--accent); }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
th { background: #f8fafc; font-weight: bold; }
.btn { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; margin-right: 4px; }
.btn-danger { background: var(--danger); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-primary { background: var(--accent); color: white; }
.tabs { display: flex; gap: 8px; margin-bottom: 15px; }
.tab { padding: 10px 20px; background: #cbd5e1; border-radius: 6px; cursor: pointer; font-weight: bold; }
.tab.active { background: var(--accent); color: white; }
.login-box { max-width: 400px; margin: 100px auto; }
.form-group { margin-bottom: 14px; display: flex; flex-direction: column; }
.form-group label { margin-bottom: 4px; font-weight: bold; }
.form-group input { padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="container">
  <div id="login-section" class="card login-box">
    <h2>🔒 管理者ログイン</h2>
    <div class="form-group">
      <label>ユーザー名</label>
      <input type="text" id="login-user" placeholder="admin">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-pass" placeholder="初期パスワード: admin123">
    </div>
    <button class="btn btn-primary" style="width:100%; padding:10px;" onclick="handleLogin()">ログイン</button>
  </div>

  <div id="admin-dashboard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h1 style="margin:0; color:var(--accent);">⚙ 試験管理総合ダッシュボード</h1>
      <div>
        <a href="admin_users.html" target="_blank" class="btn btn-primary">👤 管理者アカウントの新規登録</a>
        <button class="btn btn-danger" onclick="location.reload()">ログアウト</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('exams-tab')">📊 実施テスト一覧</div>
      <div class="tab" onclick="switchTab('results-tab')">🎓 受験者回答結果</div>
      <div class="tab" onclick="switchTab('logs-tab')">📜 ログイン履歴・ユーザー確認</div>
    </div>

    <div id="exams-tab" class="tab-content card">
      <h2>📊 登録テスト一覧情報</h2>
      <table id="exams-table">
        <thead>
          <tr>
            <th>試験ID</th>
            <th>試験名</th>
            <th>制限時間</th>
            <th>現在のステータス</th>
            <th>操作アクション</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="results-tab" class="tab-content card" style="display:none;">
      <h2>🎓 受験生徒の成績一覧データ</h2>
      <table id="results-table">
        <thead>
          <tr>
            <th>試験名</th>
            <th>学籍番号</th>
            <th>氏名</th>
            <th>得点 / 満点</th>
            <th>受験日時</th>
            <th>再受験操作（常時表示）</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="logs-tab" class="tab-content card" style="display:none;">
      <div style="display:flex; gap:20px;">
        <div style="flex:1;">
          <h2>📜 管理者ログイン履歴</h2>
          <table id="logs-table">
            <thead>
              <tr>
                <th>管理者ユーザー</th>
                <th>ログイン日時</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div style="flex:1;">
          <h2>👥 ログイン許可管理者一覧表</h2>
          <table id="users-table">
            <thead>
              <tr>
                <th>ユーザー名</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// デフォルトの管理者初期化
if(!localStorage.getItem('EXAM_SYSTEM_USERS')) {
  localStorage.setItem('EXAM_SYSTEM_USERS', JSON.stringify([{username: 'admin', password: 'admin123'}]));
}

function handleLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const users = JSON.parse(localStorage.getItem('EXAM_SYSTEM_USERS') || '[]');

  const match = users.find(u => u.username === user && u.password === pass);
  if(match) {
    // ログイン履歴への追加
    const logs = JSON.parse(localStorage.getItem('EXAM_SYSTEM_LOGS') || '[]');
    logs.unshift({ username: user, timestamp: new Date().toLocaleString() });
    localStorage.setItem('EXAM_SYSTEM_LOGS', JSON.stringify(logs));

    document.getElementById('login-section').style.display = 'none';
    document.getElementById('admin-dashboard').style.display = 'block';
    
    loadExams();
    loadResults();
    loadLogsAndUsers();
  } else {
    alert('ユーザー名またはパスワードが正しくありません。');
  }
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).style.display = 'block';
  event.target.classList.add('active');
}

// テスト管理一覧
function loadExams() {
  const exams = JSON.parse(localStorage.getItem('EXAM_SYSTEM_EXAMS') || '[]');
  const tbody = document.querySelector('#exams-table tbody');
  tbody.innerHTML = '';

  exams.forEach(e => {
    const tr = document.createElement('tr');
    const isAct = e.status === 'active';
    tr.innerHTML = `
      <td><b>${e.settings.examId}</b></td>
      <td>${e.settings.examName}</td>
      <td>${e.settings.timeLimit} 秒</td>
      <td style="color:${isAct ? 'var(--success)' : 'var(--danger)'}; font-weight:bold;">${isAct ? '実施中' : '回答終了'}</td>
      <td>
        ${isAct ? `<button class="btn btn-danger" onclick="toggleExamStatus('${e.settings.examId}', 'suspended')">回答を終了</button>` 
                : `<button class="btn btn-success" onclick="toggleExamStatus('${e.settings.examId}', 'active')">再開</button>`}
        <button class="btn btn-danger" style="background:#b91c1c;" onclick="deleteExam('${e.settings.examId}')">削除</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleExamStatus(examId, nextStatus) {
  let exams = JSON.parse(localStorage.getItem('EXAM_SYSTEM_EXAMS') || '[]');
  exams = exams.map(e => { if(e.settings.examId === examId) { e.status = nextStatus; } return e; });
  localStorage.setItem('EXAM_SYSTEM_EXAMS', JSON.stringify(exams));
  loadExams();
}

function deleteExam(examId) {
  if(!confirm('本当にこのテストを削除しますか？\n削除すると、これに回答した生徒の全回答記録もすべて一緒に消去されます。')) return;
  
  let exams = JSON.parse(localStorage.getItem('EXAM_SYSTEM_EXAMS') || '[]');
  exams = exams.filter(e => e.settings.examId !== examId);
  localStorage.setItem('EXAM_SYSTEM_EXAMS', JSON.stringify(exams));

  let results = JSON.parse(localStorage.getItem('EXAM_SYSTEM_RESULTS') || '[]');
  results = results.filter(r => r.examId !== examId);
  localStorage.setItem('EXAM_SYSTEM_RESULTS', JSON.stringify(results));

  loadExams();
  loadResults();
}

// 生徒回答結果 & 再受験可能化
function loadResults() {
  const results = JSON.parse(localStorage.getItem('EXAM_SYSTEM_RESULTS') || '[]');
  const tbody = document.querySelector('#results-table tbody');
  tbody.innerHTML = '';

  results.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.examName}</td>
      <td>${r.studentId}</td>
      <td>${r.studentName}</td>
      <td><b>${r.score}</b> / ${r.totalScore} 点</td>
      <td>${r.timestamp}</td>
      <td><button class="btn btn-danger" onclick="allowReExam('${r.id}')">再受験を許可 (データを削除)</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function allowReExam(resultId) {
  if(!confirm('該当生徒の回答データを削除して、再受験ができる状態へ変更しますか？')) return;
  let results = JSON.parse(localStorage.getItem('EXAM_SYSTEM_RESULTS') || '[]');
  results = results.filter(r => r.id !== resultId);
  localStorage.setItem('EXAM_SYSTEM_RESULTS', JSON.stringify(results));
  loadResults();
}

// ログとユーザー一覧
function loadLogsAndUsers() {
  const logs = JSON.parse(localStorage.getItem('EXAM_SYSTEM_LOGS') || '[]');
  const lBody = document.querySelector('#logs-table tbody');
  lBody.innerHTML = '';
  logs.forEach(l => {
    lBody.innerHTML += `<tr><td>${l.username}</td><td>${l.timestamp}</td></tr>`;
  });

  const users = JSON.parse(localStorage.getItem('EXAM_SYSTEM_USERS') || '[]');
  const uBody = document.querySelector('#users-table tbody');
  uBody.innerHTML = '';
  users.forEach(u => {
    uBody.innerHTML += `<tr>
      <td><b>${u.username}</b></td>
      <td>${u.username === 'admin' ? '<i style="color:gray;">削除不可</i>' : `<button class="btn btn-danger" onclick="deleteUser('${u.username}')">削除</button>`}</td>
    </tr>`;
  });
}

function deleteUser(username) {
  if(!confirm(`管理者ユーザー「${username}」のログイン権限を削除しますか？`)) return;
  let users = JSON.parse(localStorage.getItem('EXAM_SYSTEM_USERS') || '[]');
  users = users.filter(u => u.username !== username);
  localStorage.setItem('EXAM_SYSTEM_USERS', JSON.stringify(users));
  loadLogsAndUsers();
}
</script>
</body>
</html>
