<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>教員管理画面</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f8f9fa;color:#333;}
table{width:100%;border-collapse:collapse;margin-top:10px;background:white;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#f1f3f4;}
.tab-container{display:flex;margin-bottom:20px;border-bottom:2px solid #ccc;}
.tab{padding:10px 20px;cursor:pointer;background:#e0e0e0;border-radius:5px 5px 0 0;margin-right:5px;font-weight:bold;}
.tab.active{background:#1a73e8;color:white;}
.panel{background:white;padding:25px;border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,0.1);display:none;}
.panel.active{display:block;}
.editor-sec{border:1px solid #dadce0;padding:20px;margin-bottom:20px;border-radius:8px;background:#fdfdfd;}
.editor-q{background:#f1f3f4;padding:15px;margin:15px 0;border-radius:6px;}
input[type="text"], input[type="number"], select{width:100%;padding:8px;margin:5px 0;box-sizing:border-box;font-size:14px;}
.btn{padding:8px 16px;font-size:14px;cursor:pointer;font-weight:bold;border:none;border-radius:4px;margin:5px;}
.btn-blue{background:#1a73e8;color:white;}
.btn-green{background:#137333;color:white;}
.btn-red{background:#d93025;color:white;}
</style>
</head>
<body>
<h2>教員用ダッシュボード</h2>

<div id="login" style="text-align:center; margin-top:50px;">
  <input id="pass" type="password" placeholder="パスワード" style="padding:10px; width:250px; font-size:16px;">
  <button class="btn btn-blue" onclick="login()" style="padding:10px 20px;">ログイン</button>
</div>

<div id="panel" style="display:none;">
  <div class="tab-container">
    <div id="tab1" class="tab active" onclick="switchTab(1)">① 受験者成績・ステータス確認</div>
    <div id="tab2" class="tab" onclick="switchTab(2)">② テスト構成・作成（Googleフォーム風）</div>
  </div>

  <div id="panel1" class="panel active">
    <button class="btn btn-blue" onclick="load()">更新</button>
    <button class="btn btn-green" onclick="downloadCSV()">CSVダウンロード</button>
    <div id="table" style="margin-top:15px;"></div>
  </div>

  <div id="panel2" class="panel">
    <h3>試験共通プロパティ設定</h3>
    <label><b>試験名（タイトル）:</b></label>
    <input type="text" id="edit-exam-name">
    <label><b>制限時間（秒）:</b></label>
    <input type="number" id="edit-time-limit" style="width:120px;"><br><br>

    <div id="sections-builder"></div>

    <button class="btn btn-blue" onclick="addSection()">＋ 新しいセクションを追加</button>
    <hr style="margin:30px 0;">
    <div style="text-align:center;">
      <button class="btn btn-green" onclick="saveAndDownloadConfig()" style="font-size:16px; padding:12px 35px;">config.json として設定を保存・ダウンロード</button>
    </div>
  </div>
</div>

<script>
// 元のパスワード・URL設定を完全維持（fetchのURLクォーテーション漏れを修正）
const PASSWORD = "admin ishikariminami 2026";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/1NpHCOwH60GncxJo0cgw3SurnItWMiQBSykT4iD8vuj8/pub?output=csv";
let csvData = "";
let currentConfig = { examName: "", timeLimit: 1800, randomQuestion: true, randomChoice: true, disqualifyLimit: 3, passScore: 60, sections: [] };

function login(){
  if(document.getElementById("pass").value === PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    load();
    loadConfigForEditor();
  } else {
    alert("パスワードが違います。");
  }
}

function switchTab(num) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab' + num).classList.add('active');
  document.getElementById('panel' + num).classList.add('active');
}

// 元々の成績取得・テーブルマッピング処理（r[0]〜r[5]の並び順）を完全に維持
async function load(){
  const res = await fetch("https://script.google.com/macros/s/AKfycbx_7hO1brtwsA7MZIxq7pj3YeDWrTySisWcWyeV-my0SDwFaxvi-Cd2uS_RpUm4UdQ_/exec");
  csvData = await res.text();
  const rows = csvData.trim().split("\n");
  let html = `<table><tr><th>名前</th><th>学籍番号</th><th>点数</th><th>離脱回数</th><th>離脱時間</th><th>不正</th></tr>`;
  for(let i=1; i<rows.length; i++){
    let r = rows[i].split(",");
    if(r.length < 4) continue;
    html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[3]}</td></tr>`;
  }
  document.getElementById("table").innerHTML = html + `</table>`;
}

// 元のCSVダウンロード機能を維持
function downloadCSV(){
  const blob = new Blob([csvData], {type: "text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "exam_results.csv";
  a.click();
}

// エディタ用に既存のconfig.jsonを読み込む
async function loadConfigForEditor() {
  try {
    const res = await fetch("config.json");
    currentConfig = await res.json();
  } catch(e) {
    // 存在しない、またはエラー時はデフォルトの空枠を作成
    if(!currentConfig.sections) currentConfig.sections = [];
  }
  document.getElementById("edit-exam-name").value = currentConfig.examName || "新規定期テスト";
  document.getElementById("edit-time-limit").value = currentConfig.timeLimit || 1800;
  renderEditor();
}

// Googleフォーム風の編集インターフェースを描画
function renderEditor() {
  let html = "";
  if(!currentConfig.sections) currentConfig.sections = [];
  
  currentConfig.sections.forEach((sec, sIdx) => {
    html += `
      <div class="editor-sec">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h4 style="margin:0; color:#1a73e8;">■ セクション ${sIdx + 1}</h4>
          <button class="btn btn-red" style="padding:4px 8px; font-size:12px;" onclick="removeSection(${sIdx})">セクション削除</button>
        </div>
        <input type="text" placeholder="セクションのタイトル (例: 第1章 基礎知識)" value="${sec.title || ''}" onchange="currentConfig.sections[${sIdx}].title=this.value">
        
        <div id="questions-area-${sIdx}">`;
        
    if(sec.questions) {
      sec.questions.forEach((q, qIdx) => {
        html += `
          <div class="editor-q">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
              <label><b>問題 ${qIdx + 1}:</b></label>
              <button class="btn btn-red" style="padding:2px 6px; font-size:11px;" onclick="removeQuestion(${sIdx}, ${qIdx})">問題を削除</button>
            </div>
            <input type="text" placeholder="問題文を入力してください" value="${q.q || ''}" onchange="currentConfig.sections[${sIdx}].questions[${qIdx}].q=this.value">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
              <div>選択肢1: <input type="text" value="${q.choices[0]||''}" onchange="currentConfig.sections[${sIdx}].questions[${qIdx}].choices[0]=this.value"></div>
              <div>選択肢2: <input type="text" value="${q.choices[1]||''}" onchange="currentConfig.sections[${sIdx}].questions[${qIdx}].choices[1]=this.value"></div>
              <div>選択肢3: <input type="text" value="${q.choices[2]||''}" onchange="currentConfig.sections[${sIdx}].questions[${qIdx}].choices[2]=this.value"></div>
              <div>選択肢4: <input type="text" value="${q.choices[3]||''}" onchange="currentConfig.sections[${sIdx}].questions[${qIdx}].choices[3]=this.value"></div>
            </div>
            
            <label style="margin-top:8px; display:block; font-size:13px;"><b>正解となる選択肢の番号:</b></label>
            <select onchange="currentConfig.sections[${sIdx}].questions[${qIdx}].ans=Number(this.value)">
              <option value="1" ${q.ans===1?'selected':''}>選択肢1が正解</option>
              <option value="2" ${q.ans===2?'selected':''}>選択肢2が正解</option>
              <option value="3" ${q.ans===3?'selected':''}>選択肢3が正解</option>
              <option value="4" ${q.ans===4?'selected':''}>選択肢4が正解</option>
            </select>
          </div>`;
      });
    }
    
    html += `
        </div>
        <button class="btn btn-blue" style="background:#5f6368; font-size:12px;" onclick="addQuestion(${sIdx})">＋ このセクションに問題を追加</button>
      </div>`;
  });
  document.getElementById("sections-builder").innerHTML = html;
}

function addSection() {
  currentConfig.sections.push({ title: "新しいセクション", questions: [] });
  renderEditor();
}

function removeSection(sIdx) {
  if(confirm("このセクションと、中に含まれる問題がすべて削除されます。よろしいですか？")) {
    currentConfig.sections.splice(sIdx, 1);
    renderEditor();
  }
}

function addQuestion(sIdx) {
  if(!currentConfig.sections[sIdx].questions) currentConfig.sections[sIdx].questions = [];
  currentConfig.sections[sIdx].questions.push({
    q: "新しい問題文",
    choices: ["選択肢A", "選択肢B", "選択肢C", "選択肢D"],
    ans: 1
  });
  renderEditor();
}

function removeQuestion(sIdx, qIdx) {
  currentConfig.sections[sIdx].questions.splice(qIdx, 1);
  renderEditor();
}

// 画面での編集結果をconfig.jsonとしてエクスポート
function saveAndDownloadConfig() {
  currentConfig.examName = document.getElementById("edit-exam-name").value;
  currentConfig.timeLimit = Number(document.getElementById("edit-time-limit").value);

  const jsonStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentConfig, null, 2));
  const dlAnchor = document.createElement('a');
  dlAnchor.setAttribute("href", jsonStr);
  dlAnchor.setAttribute("download", "config.json");
  dlAnchor.click();
}
</script>
</body>
</html>
